name: Deploy to Production

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-approval:
    name: Request Production Approval
    runs-on: ubuntu-latest
    needs: build-and-push

    environment:
      name: production
      url: https://api.brain-storm.example.com

    outputs:
      deployment-id: ${{ steps.deployment.outputs.deployment-id }}

    steps:
      - name: Create deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: `Production deployment for ${{ github.event.release.tag_name }}`,
              required_contexts: [],
              auto_merge: false,
            });
            core.setOutput('deployment-id', deployment.data.id);

      - name: Deployment status - pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment-id }},
              state: 'pending',
              description: 'Waiting for approval...',
            });

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-approval]

    permissions:
      id-token: write
      contents: read

    environment:
      name: production
      url: https://api.brain-storm.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-BrainStorm-Production
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run database migrations
        run: |
          docker run --rm \
            -e DATABASE_HOST=${{ secrets.DATABASE_HOST }} \
            -e DATABASE_PORT=${{ secrets.DATABASE_PORT }} \
            -e DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME }} \
            -e DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} \
            -e DATABASE_NAME=${{ secrets.DATABASE_NAME }} \
            ${{ needs.build-and-push.outputs.image-tag }} \
            node apps/backend/dist/main migration:run

      - name: Deploy to production
        run: |
          echo "Deploying ${{ needs.build-and-push.outputs.image-tag }} to production"
          # Example ECS deployment:
          # aws ecs update-service \
          #   --cluster production \
          #   --service brain-storm-backend \
          #   --force-new-deployment

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf https://api.brain-storm.example.com/health; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed"
          exit 1

      - name: Deployment status - success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ needs.deploy-approval.outputs.deployment-id }},
              state: 'success',
              description: 'Successfully deployed to production',
              environment_url: 'https://api.brain-storm.example.com',
            });

      - name: Deployment status - failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ needs.deploy-approval.outputs.deployment-id }},
              state: 'failure',
              description: 'Deployment failed',
            });

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: failure()

    permissions:
      id-token: write
      contents: read

    environment:
      name: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-BrainStorm-Rollback
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get previous release tag
        id: previous-tag
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 2,
            });
            if (releases.data.length < 2) {
              core.setFailed('No previous release found for rollback');
              return;
            }
            const previousTag = releases.data[1].tag_name;
            core.setOutput('tag', previousTag);
            console.log(`Rolling back to: ${previousTag}`);

      - name: Rollback to previous version
        if: steps.previous-tag.outputs.tag
        run: |
          PREVIOUS_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.previous-tag.outputs.tag }}"
          echo "Rolling back to $PREVIOUS_IMAGE"
          # Example ECS rollback:
          # aws ecs update-service \
          #   --cluster production \
          #   --service brain-storm-backend \
          #   --force-new-deployment

      - name: Notify rollback via release comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({});
            // Post to the release discussion instead of an issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.release.id }},
              body: `🔄 **Deployment Rollback**\n\nProduction deployment failed and has been rolled back.\n\n- Failed release: \`${{ github.event.release.tag_name }}\`\n- Rolled back to: \`${{ steps.previous-tag.outputs.tag }}\``
            }).catch(() => {
              // Release comments use a different API; log and continue
              console.log('Rollback completed. Release: ${{ github.event.release.tag_name }}, Previous: ${{ steps.previous-tag.outputs.tag }}');
            });
