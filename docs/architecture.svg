<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Brain-Storm — System Architecture</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 1: CLIENT -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="50" width="920" height="110" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="36" y="70" font-size="11" font-weight="600" fill="#1d4ed8">CLIENT LAYER</text>

  <!-- Browser -->
  <rect x="60" y="80" width="160" height="64" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="140" y="100" text-anchor="middle" font-weight="600" fill="#1e40af">Next.js 14 Frontend</text>
  <text x="140" y="116" text-anchor="middle" fill="#3b82f6">App Router · TypeScript</text>
  <text x="140" y="130" text-anchor="middle" fill="#3b82f6">Tailwind · Zustand</text>

  <!-- Freighter -->
  <rect x="260" y="80" width="130" height="64" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="325" y="100" text-anchor="middle" font-weight="600" fill="#1e40af">Freighter Wallet</text>
  <text x="325" y="116" text-anchor="middle" fill="#3b82f6">Browser Extension</text>
  <text x="325" y="130" text-anchor="middle" fill="#3b82f6">SEP-0010 Auth</text>

  <!-- Socket.io client -->
  <rect x="420" y="80" width="130" height="64" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="485" y="100" text-anchor="middle" font-weight="600" fill="#1e40af">WebSocket Client</text>
  <text x="485" y="116" text-anchor="middle" fill="#3b82f6">socket.io-client</text>
  <text x="485" y="130" text-anchor="middle" fill="#3b82f6">Real-time notifications</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 2: BACKEND -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="200" width="920" height="160" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="36" y="220" font-size="11" font-weight="600" fill="#15803d">BACKEND LAYER  (NestJS · REST API · port 3000)</text>

  <!-- Auth -->
  <rect x="40" y="230" width="110" height="56" rx="6" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="95" y="250" text-anchor="middle" font-weight="600" fill="#166534">Auth</text>
  <text x="95" y="265" text-anchor="middle" fill="#16a34a">JWT · MFA</text>
  <text x="95" y="278" text-anchor="middle" fill="#16a34a">SEP-0010</text>

  <!-- Courses -->
  <rect x="165" y="230" width="110" height="56" rx="6" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="220" y="250" text-anchor="middle" font-weight="600" fill="#166534">Courses</text>
  <text x="220" y="265" text-anchor="middle" fill="#16a34a">Modules · Lessons</text>
  <text x="220" y="278" text-anchor="middle" fill="#16a34a">Reviews · Forums</text>

  <!-- Progress -->
  <rect x="290" y="230" width="110" height="56" rx="6" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="345" y="250" text-anchor="middle" font-weight="600" fill="#166534">Progress</text>
  <text x="345" y="265" text-anchor="middle" fill="#16a34a">Enrollment</text>
  <text x="345" y="278" text-anchor="middle" fill="#16a34a">Completion</text>

  <!-- Credentials -->
  <rect x="415" y="230" width="110" height="56" rx="6" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="470" y="250" text-anchor="middle" font-weight="600" fill="#166534">Credentials</text>
  <text x="470" y="265" text-anchor="middle" fill="#16a34a">Issue · Verify</text>
  <text x="470" y="278" text-anchor="middle" fill="#16a34a">PDF Export</text>

  <!-- Stellar Service -->
  <rect x="540" y="230" width="120" height="56" rx="6" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="600" y="250" text-anchor="middle" font-weight="600" fill="#166534">StellarService</text>
  <text x="600" y="265" text-anchor="middle" fill="#16a34a">Horizon · Soroban</text>
  <text x="600" y="278" text-anchor="middle" fill="#16a34a">mintReward · issue</text>

  <!-- Notifications -->
  <rect x="675" y="230" width="120" height="56" rx="6" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="735" y="250" text-anchor="middle" font-weight="600" fill="#166534">Notifications</text>
  <text x="735" y="265" text-anchor="middle" fill="#16a34a">WS Gateway</text>
  <text x="735" y="278" text-anchor="middle" fill="#16a34a">EventEmitter</text>

  <!-- Users / Referrals -->
  <rect x="810" y="230" width="110" height="56" rx="6" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="865" y="250" text-anchor="middle" font-weight="600" fill="#166534">Users</text>
  <text x="865" y="265" text-anchor="middle" fill="#16a34a">Profiles · KYC</text>
  <text x="865" y="278" text-anchor="middle" fill="#16a34a">Referrals</text>

  <!-- TypeORM label -->
  <text x="480" y="348" text-anchor="middle" font-size="10" fill="#15803d">TypeORM · PostgreSQL ORM</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 3: DATA STORES -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="390" width="430" height="90" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="36" y="410" font-size="11" font-weight="600" fill="#92400e">DATA STORES</text>

  <!-- PostgreSQL -->
  <rect x="40" y="418" width="130" height="50" rx="6" fill="#fff" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="105" y="438" text-anchor="middle" font-weight="600" fill="#78350f">PostgreSQL</text>
  <text x="105" y="453" text-anchor="middle" fill="#b45309">Users · Courses</text>
  <text x="105" y="466" text-anchor="middle" fill="#b45309">Progress · Creds</text>

  <!-- Redis -->
  <rect x="190" y="418" width="130" height="50" rx="6" fill="#fff" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="255" y="438" text-anchor="middle" font-weight="600" fill="#78350f">Redis</text>
  <text x="255" y="453" text-anchor="middle" fill="#b45309">Cache · Sessions</text>
  <text x="255" y="466" text-anchor="middle" fill="#b45309">Rate limiting</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 4: STELLAR NETWORK -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="470" y="390" width="470" height="90" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="486" y="410" font-size="11" font-weight="600" fill="#6b21a8">STELLAR NETWORK</text>

  <!-- Horizon -->
  <rect x="490" y="418" width="100" height="50" rx="6" fill="#fff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="540" y="438" text-anchor="middle" font-weight="600" fill="#581c87">Horizon API</text>
  <text x="540" y="453" text-anchor="middle" fill="#7c3aed">Balances</text>
  <text x="540" y="466" text-anchor="middle" fill="#7c3aed">Transactions</text>

  <!-- Soroban RPC -->
  <rect x="605" y="418" width="100" height="50" rx="6" fill="#fff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="655" y="438" text-anchor="middle" font-weight="600" fill="#581c87">Soroban RPC</text>
  <text x="655" y="453" text-anchor="middle" fill="#7c3aed">Contract calls</text>
  <text x="655" y="466" text-anchor="middle" fill="#7c3aed">Simulation</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 5: SMART CONTRACTS -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="510" width="920" height="130" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="36" y="530" font-size="11" font-weight="600" fill="#9a3412">SOROBAN SMART CONTRACTS  (Rust · wasm32)</text>

  <!-- Analytics -->
  <rect x="40" y="540" width="150" height="82" rx="6" fill="#fff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="115" y="560" text-anchor="middle" font-weight="600" fill="#9a3412">Analytics</text>
  <text x="115" y="575" text-anchor="middle" fill="#c2410c">record_progress()</text>
  <text x="115" y="589" text-anchor="middle" fill="#c2410c">get_progress()</text>
  <text x="115" y="603" text-anchor="middle" fill="#c2410c">Per-student on-chain</text>
  <text x="115" y="617" text-anchor="middle" fill="#c2410c">progress %</text>

  <!-- Token -->
  <rect x="210" y="540" width="150" height="82" rx="6" fill="#fff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="285" y="560" text-anchor="middle" font-weight="600" fill="#9a3412">Token (BST)</text>
  <text x="285" y="575" text-anchor="middle" fill="#c2410c">mint_reward()</text>
  <text x="285" y="589" text-anchor="middle" fill="#c2410c">balance()</text>
  <text x="285" y="603" text-anchor="middle" fill="#c2410c">transfer()</text>
  <text x="285" y="617" text-anchor="middle" fill="#c2410c">50 BST referral reward</text>

  <!-- Certificate -->
  <rect x="380" y="540" width="150" height="82" rx="6" fill="#fff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="455" y="560" text-anchor="middle" font-weight="600" fill="#9a3412">Certificate</text>
  <text x="455" y="575" text-anchor="middle" fill="#c2410c">issue_credential()</text>
  <text x="455" y="589" text-anchor="middle" fill="#c2410c">verify()</text>
  <text x="455" y="603" text-anchor="middle" fill="#c2410c">Tamper-proof</text>
  <text x="455" y="617" text-anchor="middle" fill="#c2410c">on-chain certs</text>

  <!-- Governance -->
  <rect x="550" y="540" width="150" height="82" rx="6" fill="#fff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="625" y="560" text-anchor="middle" font-weight="600" fill="#9a3412">Governance</text>
  <text x="625" y="575" text-anchor="middle" fill="#c2410c">propose()</text>
  <text x="625" y="589" text-anchor="middle" fill="#c2410c">vote()</text>
  <text x="625" y="603" text-anchor="middle" fill="#c2410c">execute()</text>
  <text x="625" y="617" text-anchor="middle" fill="#c2410c">DAO governance</text>

  <!-- Shared -->
  <rect x="720" y="540" width="200" height="82" rx="6" fill="#fff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="820" y="560" text-anchor="middle" font-weight="600" fill="#9a3412">Shared</text>
  <text x="820" y="575" text-anchor="middle" fill="#c2410c">RBAC · reentrancy guard</text>
  <text x="820" y="589" text-anchor="middle" fill="#c2410c">Common validation</text>
  <text x="820" y="603" text-anchor="middle" fill="#c2410c">Used by all contracts</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROWS: Client → Backend -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Frontend → Backend (REST) -->
  <line x1="140" y1="144" x2="140" y2="228" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <text x="148" y="192" font-size="10" fill="#3b82f6">REST /v1</text>

  <!-- Freighter → Auth (SEP-0010) -->
  <line x1="325" y1="144" x2="95" y2="228" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="190" y="185" font-size="10" fill="#64748b">SEP-0010</text>

  <!-- WS Client → Notifications Gateway -->
  <line x1="485" y1="144" x2="735" y2="228" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <text x="590" y="178" font-size="10" fill="#22c55e">WebSocket</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROWS: Backend → Data Stores -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="220" y1="360" x2="105" y2="416" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <line x1="345" y1="360" x2="255" y2="416" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROWS: Backend → Stellar Network -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="600" y1="360" x2="540" y2="416" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="360" x2="655" y2="416" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROWS: Soroban RPC → Contracts -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="540" y1="468" x2="285" y2="538" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="655" y1="468" x2="455" y2="538" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="655" y1="468" x2="625" y2="538" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="468" x2="115" y2="538" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- DATA FLOW LEGEND -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="655" width="920" height="52" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="36" y="672" font-size="10" font-weight="600" fill="#475569">KEY FLOWS</text>

  <!-- Legend items -->
  <line x1="36" y1="690" x2="66" y2="690" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <text x="72" y="694" font-size="10" fill="#475569">REST API</text>

  <line x1="150" y1="690" x2="180" y2="690" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <text x="186" y="694" font-size="10" fill="#475569">WebSocket</text>

  <line x1="270" y1="690" x2="300" y2="690" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="306" y="694" font-size="10" fill="#475569">DB read/write</text>

  <line x1="400" y1="690" x2="430" y2="690" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="436" y="694" font-size="10" fill="#475569">Stellar / Soroban call</text>

  <line x1="570" y1="690" x2="600" y2="690" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="606" y="694" font-size="10" fill="#475569">Wallet auth (SEP-0010)</text>

  <!-- Flow annotations -->
  <text x="36" y="706" font-size="10" fill="#64748b">Enrollment → Progress record → 100% → Certificate issued + BST minted → Notification emitted → Referrer rewarded (50 BST)</text>
</svg>
